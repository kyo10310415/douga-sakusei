# render.yaml - VTuber Studio 本番インフラ定義
# Render Blueprint (IaC) https://render.com/docs/blueprint-spec
#
# サービス構成（有料プラン・統合コンテナ版）:
#   - api     : FastAPI + Celery Worker + Celery Beat（supervisordで1コンテナ統合）
#   - web     : Next.js フロントエンド
#   - db      : PostgreSQL 16 Managed Database
#   - redis   : Redis Managed Instance
#
# ストレージ:
#   音声・動画ファイルは Render Disk（永続SSD）に保存。
#   APIとWorkerが同一コンテナなのでディスクを共有できる。
#   マウントパス: /opt/render/project/src/uploads
#   Dockerのデフォルト WORKDIR が /app なので /app/uploads でも可だが
#   Render公式推奨は /opt/render/project/src 配下のサブディレクトリ。

services:
  # ===========================================================
  # 1. 統合バックエンド（API + Worker + Beat）
  #    supervisord で3プロセスを1コンテナで管理
  # ===========================================================
  - type: web
    name: vtuber-studio-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: starter
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1   # Disk使用時は必ず1インスタンス

    # ── Render Disk（永続ストレージ）──
    # API・Worker・Beatが同一コンテナなのでこのパスを共有できる
    disk:
      name: vtuber-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 10       # 月額 $2.50。動画10本程度ならこれで十分

    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false        # 例: https://vtuber-studio-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: vtuber-studio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vtuber-studio-redis
          type: redis
          property: connectionString
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REDIRECT_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TTS_PROVIDER
        value: openai
      - key: TTS_API_KEY
        sync: false
      - key: IMAGE_GENERATION_PROVIDER
        value: mock
      - key: VIDEO_GENERATION_PROVIDER
        value: ffmpeg
      # ── ストレージ設定（Render Disk 使用）──
      - key: STORAGE_PROVIDER
        value: local          # Disk使用のため local のまま
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads   # Diskのマウントパスと一致させる
      - key: STORAGE_BASE_URL
        sync: false           # 例: https://vtuber-studio-api.onrender.com/static/uploads

  # ===========================================================
  # 2. Next.js フロントエンド
  # ===========================================================
  - type: web
    name: vtuber-studio-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    plan: starter
    region: oregon
    autoDeploy: true

    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false        # 例: https://vtuber-studio-api.onrender.com
      - key: NODE_ENV
        value: production

  # ===========================================================
  # 3. Redis（Celery ブローカー + 結果バックエンド）
  # ===========================================================
  - type: redis
    name: vtuber-studio-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

# ===========================================================
# 4. PostgreSQL データベース
# ===========================================================
databases:
  - name: vtuber-studio-db
    databaseName: vtuber_studio
    plan: starter
    region: oregon
    postgresMajorVersion: 16
