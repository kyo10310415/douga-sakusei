# render.yaml - VTuber Studio 本番インフラ定義
# Render Blueprint (IaC) https://render.com/docs/blueprint-spec
#
# 含まれるサービス（無料プラン構成）:
#   - api  : FastAPI Web Service（Celery Worker/Beat も同梱起動）
#   - web  : Next.js Web Service
#   - db   : PostgreSQL 16 Managed Database
#   - redis: Redis Managed Instance
#
# ※ Renderの無料プランはBackground Workerが使えないため
#    Celery Worker と Beat は api サービスの start.sh 内で起動します

services:
  # ===========================================================
  # 1. FastAPI バックエンド API
  # ===========================================================
  - type: web
    name: vtuber-studio-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # App
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true   # Renderが自動生成
      - key: ALLOWED_ORIGINS
        sync: false           # Renderダッシュボードで手動設定（フロントURLを入力）

      # Database（PostgreSQL サービスから自動注入）
      - key: DATABASE_URL
        fromDatabase:
          name: vtuber-studio-db
          property: connectionString

      # Redis（Redis サービスから自動注入）
      - key: REDIS_URL
        fromService:
          name: vtuber-studio-redis
          type: redis
          property: connectionString

      # YouTube OAuth（Renderダッシュボードで手動設定）
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REDIRECT_URI
        sync: false           # 例: https://vtuber-studio-api.onrender.com/api/youtube/oauth/callback

      # OpenAI
      - key: OPENAI_API_KEY
        sync: false

      # TTS / Image / Video providers
      - key: TTS_PROVIDER
        value: mock           # 本番切り替え時に変更
      - key: TTS_API_KEY
        sync: false
      - key: IMAGE_GENERATION_PROVIDER
        value: mock
      - key: IMAGE_GENERATION_API_KEY
        sync: false
      - key: VIDEO_GENERATION_PROVIDER
        value: mock
      - key: VIDEO_GENERATION_API_KEY
        sync: false

      # Storage（Renderの/tmp は永続化されないため、S3/R2推奨）
      - key: STORAGE_PROVIDER
        value: local          # 本番は s3 に変更を推奨
      - key: STORAGE_BUCKET
        value: vtuber-uploads
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads

  # ===========================================================
  # 2. Next.js フロントエンド
  # ===========================================================
  - type: web
    name: vtuber-studio-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    plan: free
    region: oregon
    autoDeploy: true

    envVars:
      - key: NEXT_PUBLIC_API_URL
        # Renderダッシュボードで手動設定:
        # 例: https://vtuber-studio-api.onrender.com
        sync: false
      - key: NODE_ENV
        value: production

  # ===========================================================
  # 3. Redis（Celery ブローカー + 結果バックエンド）
  # ===========================================================
  - type: redis
    name: vtuber-studio-redis
    plan: free                 # 本番は starter 以上を推奨
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []            # Render内部からのみ許可

# ===========================================================
# 4. PostgreSQL データベース
# ===========================================================
databases:
  - name: vtuber-studio-db
    databaseName: vtuber_studio
    plan: free                 # 本番は starter 以上を推奨（free は90日で削除）
    region: oregon
    postgresMajorVersion: 16
